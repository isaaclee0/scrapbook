{% extends "base.html" %}

{% block content %}
    <div class="sort-container">
        <div class="flex items-center space-x-3 bg-gray-50 px-3 py-2 rounded-lg">
            <label for="boardSizeSlider" class="text-sm font-medium text-gray-700">Size:</label>
            <input type="range" id="boardSizeSlider" min="1" max="5" value="3" class="w-20 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer slider">
            <span id="boardSizeValue" class="text-sm font-medium text-gray-700 min-w-[4rem]">Medium</span>
            <!-- Settings cog -->
            <div class="settings-dropdown">
                <button class="settings-cog" onclick="toggleSettingsMenu()" title="Layout Settings">
                    <i class="fas fa-cog"></i>
                </button>
                <div class="settings-menu" id="settingsMenu">
                    <div class="settings-header">Layout Style</div>
                    <button class="settings-option" data-layout="modern" onclick="setLayout('modern')">
                        <span class="option-icon"><i class="fas fa-th-large"></i></span>
                        <span class="option-text">Modern (Full Image)</span>
                        <span class="option-check" id="check-modern"><i class="fas fa-check"></i></span>
                    </button>
                    <button class="settings-option" data-layout="classic" onclick="setLayout('classic')">
                        <span class="option-icon"><i class="fas fa-circle"></i></span>
                        <span class="option-text">Classic (Circle)</span>
                        <span class="option-check" id="check-classic"><i class="fas fa-check"></i></span>
                    </button>
                </div>
            </div>
        </div>
        <select id="sortBoards" onchange="sortBoards()">
            <option value="name_asc">Alphabetically (A to Z)</option>
            <option value="name_desc">Alphabetically (Z to A)</option>
            <option value="newest">Newest to Oldest</option>
            <option value="oldest">Oldest to Newest</option>
            <option value="largest">Largest to Smallest</option>
            <option value="smallest">Smallest to Largest</option>
        </select>
    </div>

    <div class="gallery layout-classic" id="boardsGallery">
        {% for board in boards %}
        <div class="board" data-name="{{ board.name }}" data-created="{{ board.created_at }}" data-pin-count="{{ board.pin_count }}">
            <a href="{{ url_for('board', board_id=board.id) }}">
                <div class="board-image-container">
                    <div class="board-skeleton-loader"></div>
                    <img src="{{ board.random_pin_image_url }}" 
                         alt="{{ board.name }} Pin" 
                         loading="lazy"
                         class="board-image"
                         onerror="this.src='/static/images/default_board.png'"
                         onload="this.classList.add('loaded'); this.previousElementSibling.style.display='none';">
                </div>
                <h3 class="board-name">{{ board.name }}</h3>
            </a>
        </div>
        {% endfor %}
    </div>

    <style>
        .sort-container {
            padding: 20px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 16px;
        }

        #sortBoards {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            background-color: white;
            cursor: pointer;
        }

        #sortBoards:focus {
            outline: none;
            border-color: #2980b9;
            box-shadow: 0 0 0 2px rgba(41, 128, 185, 0.1);
        }

        /* Settings dropdown */
        .settings-dropdown {
            position: relative;
        }
        .settings-cog {
            background: none;
            border: none;
            padding: 6px 8px;
            cursor: pointer;
            color: #666;
            font-size: 16px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .settings-cog:hover {
            background: #e5e7eb;
            color: #333;
        }
        .settings-menu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            border: 1px solid #e5e7eb;
            min-width: 200px;
            z-index: 100;
            overflow: hidden;
        }
        .settings-menu.active {
            display: block;
        }
        .settings-header {
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #e5e7eb;
            background: #f9fafb;
        }
        .settings-option {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 12px 16px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
            color: #333;
            transition: background 0.15s;
            gap: 12px;
        }
        .settings-option:hover {
            background: #f3f4f6;
        }
        .settings-option .option-icon {
            width: 20px;
            color: #666;
        }
        .settings-option .option-text {
            flex: 1;
            text-align: left;
        }
        .settings-option .option-check {
            color: #3b82f6;
            opacity: 0;
        }
        .settings-option.active .option-check {
            opacity: 1;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--board-tile-size, 220px), 1fr));
            gap: 16px;
            padding: 20px;
        }

        /* ============ MODERN LAYOUT (default) ============ */
        .gallery.layout-modern .board {
            position: relative;
            text-align: center;
            border-radius: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
            background: white;
            overflow: hidden;
        }
        .gallery.layout-modern .board:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .gallery.layout-modern .board a {
            display: block;
            position: relative;
        }
        .gallery.layout-modern .board-image-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 12px;
        }
        .gallery.layout-modern .board-skeleton-loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(240,240,240,0.8) 0%, rgba(220,220,220,1) 50%, rgba(240,240,240,0.8) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
            z-index: 1;
        }
        .gallery.layout-modern .board-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background-color: #f0f0f0;
            transition: transform 0.3s, opacity 0.3s;
            position: relative;
            z-index: 2;
            opacity: 0;
        }
        .gallery.layout-modern .board-image.loaded {
            opacity: 1;
        }
        .gallery.layout-modern .board:hover .board-image {
            transform: scale(1.05);
        }
        .gallery.layout-modern .board-name {
            position: absolute;
            bottom: 12px;
            left: 12px;
            right: 12px;
            margin: 0;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 8px;
            color: #333;
            font-size: 14px;
            font-weight: 600;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            z-index: 3;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* ============ CLASSIC LAYOUT (circle) ============ */
        .gallery.layout-classic .board {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            transition: transform 0.2s;
            background: white;
        }
        .gallery.layout-classic .board:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .gallery.layout-classic .board-image-container {
            position: relative;
            width: var(--board-image-size, 150px);
            height: var(--board-image-size, 150px);
            margin: 0 auto 10px;
            border-radius: 50%;
            overflow: hidden;
        }
        .gallery.layout-classic .board-skeleton-loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(240,240,240,0.8) 0%, rgba(220,220,220,1) 50%, rgba(240,240,240,0.8) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 50%;
            z-index: 1;
        }
        .gallery.layout-classic .board-image {
            width: 100%;
            height: 100%;
            max-width: var(--board-image-size, 150px);
            max-height: var(--board-image-size, 150px);
            object-fit: cover;
            border-radius: 50%;
            display: block;
            background-color: #f0f0f0;
            transition: width 0.2s, height 0.2s, opacity 0.3s;
            position: relative;
            z-index: 2;
            opacity: 0;
        }
        .gallery.layout-classic .board-image.loaded {
            opacity: 1;
        }
        .gallery.layout-classic .board-name {
            position: static;
            margin: 0;
            padding: 0;
            background: none;
            border-radius: 0;
            color: #333;
            font-size: inherit;
            font-weight: normal;
            box-shadow: none;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .board a {
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .gallery { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            .gallery.layout-modern .board-name {
                bottom: 8px;
                left: 8px;
                right: 8px;
                padding: 6px 10px;
                font-size: 12px;
            }
            .gallery.layout-classic .board-image-container {
                width: calc(var(--board-image-size, 150px) * 0.75);
                height: calc(var(--board-image-size, 150px) * 0.75);
            }
        }
    </style>

    <script>
        // Settings menu toggle
        function toggleSettingsMenu() {
            const menu = document.getElementById('settingsMenu');
            menu.classList.toggle('active');
        }

        // Close settings menu when clicking outside
        document.addEventListener('click', function(e) {
            const dropdown = document.querySelector('.settings-dropdown');
            const menu = document.getElementById('settingsMenu');
            if (dropdown && !dropdown.contains(e.target) && menu) {
                menu.classList.remove('active');
            }
        });

        // Set layout style
        function setLayout(layout) {
            const gallery = document.getElementById('boardsGallery');
            gallery.classList.remove('layout-modern', 'layout-classic');
            gallery.classList.add('layout-' + layout);
            
            // Update checkmarks
            document.querySelectorAll('.settings-option').forEach(opt => {
                opt.classList.remove('active');
            });
            document.querySelector(`.settings-option[data-layout="${layout}"]`).classList.add('active');
            
            // Save preference
            localStorage.setItem('boardLayout', layout);
            
            // Close menu
            document.getElementById('settingsMenu').classList.remove('active');
            
            // Update sizes for the layout
            updateBoardSize();
        }

        // Board size slider handling
        let currentLayout = 'modern';
        
        function updateBoardSize() {
            const boardSizeSlider = document.getElementById('boardSizeSlider');
            const boardSizeValue = document.getElementById('boardSizeValue');
            const sizeLabels = ['Tiny', 'Small', 'Medium', 'Large', 'Huge'];
            
            if (!boardSizeSlider || !boardSizeValue) return;
            
            const sizeLevel = parseInt(boardSizeSlider.value);
            const sizeLabel = sizeLabels[sizeLevel - 1];
            boardSizeValue.textContent = sizeLabel;
            localStorage.setItem('boardTileSize', sizeLevel);
            
            // Tile sizes for grid
            const tileSizes = {
                1: '150px',
                2: '180px',
                3: '220px',
                4: '280px',
                5: '350px'
            };
            
            // Image sizes for classic layout
            const imageSizes = {
                1: '100px',
                2: '120px',
                3: '150px',
                4: '180px',
                5: '220px'
            };
            
            const tileSize = tileSizes[sizeLevel] || tileSizes[3];
            const imageSize = imageSizes[sizeLevel] || imageSizes[3];
            
            document.documentElement.style.setProperty('--board-tile-size', tileSize);
            document.documentElement.style.setProperty('--board-image-size', imageSize);
        }

        document.addEventListener('DOMContentLoaded', function() {
            const boardSizeSlider = document.getElementById('boardSizeSlider');
            const boardSizeValue = document.getElementById('boardSizeValue');
            const gallery = document.getElementById('boardsGallery');
            
            // Load saved layout
            const savedLayout = localStorage.getItem('boardLayout') || 'classic';
            currentLayout = savedLayout;
            gallery.classList.remove('layout-modern', 'layout-classic');
            gallery.classList.add('layout-' + savedLayout);
            document.querySelector(`.settings-option[data-layout="${savedLayout}"]`).classList.add('active');
            
            if (boardSizeSlider && boardSizeValue) {
                const sizeLabels = ['Tiny', 'Small', 'Medium', 'Large', 'Huge'];
                
                // Debounced update function for smoother slider experience
                let updateTimeout;
                function debouncedUpdateBoardSize() {
                    clearTimeout(updateTimeout);
                    updateTimeout = setTimeout(updateBoardSize, 50);
                }
                
                boardSizeSlider.addEventListener('input', debouncedUpdateBoardSize);
                boardSizeSlider.addEventListener('change', updateBoardSize);
                
                // Load saved board size from localStorage
                const savedBoardSize = localStorage.getItem('boardTileSize') || 3;
                boardSizeSlider.value = savedBoardSize;
                boardSizeValue.textContent = sizeLabels[savedBoardSize - 1];
                
                // Set initial board size
                updateBoardSize();
            }
        });

        // Debounce the sort function to prevent rapid re-sorting
        let sortTimeout;
        function sortBoards() {
            clearTimeout(sortTimeout);
            sortTimeout = setTimeout(performSort, 100);
        }

        function performSort() {
            const sortBy = document.getElementById('sortBoards').value;
            const gallery = document.getElementById('boardsGallery');
            const boards = Array.from(gallery.getElementsByClassName('board'));
            
            boards.sort((a, b) => {
                switch(sortBy) {
                    case 'name_asc':
                        return a.dataset.name.localeCompare(b.dataset.name);
                    case 'name_desc':
                        return b.dataset.name.localeCompare(a.dataset.name);
                    case 'newest':
                        return new Date(b.dataset.created) - new Date(a.dataset.created);
                    case 'oldest':
                        return new Date(a.dataset.created) - new Date(b.dataset.created);
                    case 'largest':
                        return parseInt(b.dataset.pinCount) - parseInt(a.dataset.pinCount);
                    case 'smallest':
                        return parseInt(a.dataset.pinCount) - parseInt(b.dataset.pinCount);
                    default:
                        return 0;
                }
            });
            
            // Use requestAnimationFrame for smooth animations
            requestAnimationFrame(() => {
                gallery.innerHTML = '';
                boards.forEach(board => gallery.appendChild(board));
            });
        }

        // Handle image loading states
        document.addEventListener('DOMContentLoaded', function() {
            const images = document.querySelectorAll('.board-image');
            images.forEach(img => {
                if (img.complete && img.naturalHeight !== 0) {
                    // Image already loaded
                    img.classList.add('loaded');
                    const skeleton = img.previousElementSibling;
                    if (skeleton && skeleton.classList.contains('board-skeleton-loader')) {
                        skeleton.style.display = 'none';
                    }
                }
            });
        });
    </script>
{% endblock %}
